- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  tags: ingress-nginx

- name: Add ingress-nginx Helm repo
  command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when: helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stderr
  tags: ingress-nginx

- name: Update Helm repos
  command: helm repo update
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  tags: ingress-nginx

- name: Create ingress-nginx config dir
  file:
    path: /etc/ingress-nginx
    state: directory
    mode: '0755'
  tags: ingress-nginx

- name: Copy ingress-nginx values file
  copy:
    src: values.yaml
    dest: /etc/ingress-nginx/values.yaml
    mode: '0644'
  tags: ingress-nginx

- name: Install/upgrade ingress-nginx controller (hostNetwork)
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx --create-namespace
    -f /etc/ingress-nginx/values.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: helm_install
  changed_when: "'has been upgraded' in helm_install.stdout or 'has been installed' in helm_install.stdout"
  tags: ingress-nginx
