# The ImageUpdater CRs themselves are GitOps-managed like everything else, rather
# than kubectl-applied by hand -- otherwise the thing that keeps images in sync with
# git would itself drift from git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updaters
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/AndreRimes/IAC.git
    targetRevision: main
    path: kubernetes/platform/argocd/image-updaters
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
