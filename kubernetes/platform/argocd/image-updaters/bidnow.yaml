apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: bidnow
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: bidnow
      commonUpdateSettings:
        # newest-build ordering over CI commit tags -- see portfolio.yaml for why.
        updateStrategy: newest-build
        allowTags: "regexp:^main-[0-9a-f]{7}$"
      # All three bidnow images share one ImageUpdater because they share one
      # Application and one kustomization.yaml -- separate CRs would race each
      # other committing to the same file.
      images:
        - alias: front
          imageName: andrerimes/bidnow-front
          manifestTargets:
            kustomize:
              name: andrerimes/bidnow-front
        - alias: back
          imageName: andrerimes/bidnow-back
          manifestTargets:
            kustomize:
              name: andrerimes/bidnow-back
        - alias: recommendation
          imageName: andrerimes/bidnow-recommendation
          # Override: this repo's CI still pushes only :latest -- there is not a
          # single main-<sha> tag on Docker Hub for it. Applying the sha pattern
          # here would match nothing and silently freeze the image forever, so it
          # stays on digest tracking until its pipeline is updated like portfolio's.
          commonUpdateSettings:
            updateStrategy: digest
            allowTags: "regexp:^latest$"
          manifestTargets:
            kustomize:
              name: andrerimes/bidnow-recommendation
      writeBackConfig:
        method: git:secret:argocd/git-creds
        gitConfig:
          branch: main
          writeBackTarget: "kustomization:/kubernetes/apps/bidnow"
