apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: onabudget
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: onabudget
      commonUpdateSettings:
        # newest-build ordering over CI commit tags -- see portfolio.yaml for why.
        updateStrategy: newest-build
        allowTags: "regexp:^main-[0-9a-f]{7}$"
      images:
        - alias: onabudget
          imageName: andrerimes/onabudget
          manifestTargets:
            kustomize:
              name: andrerimes/onabudget
      writeBackConfig:
        method: git:secret:argocd/git-creds
        gitConfig:
          branch: main
          writeBackTarget: "kustomization:/kubernetes/apps/onabudget"
