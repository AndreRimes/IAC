apiVersion: v1
kind: Namespace
metadata:
  name: onabudget-namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: onabudget-config
  namespace: onabudget-namespace
data:
  DATABASE_URL: "file:/data/db.sqlite"
  NODE_ENV: "production"
  BETTER_AUTH_URL: "https://onabudget.andrerimes.com/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onabudget-sqlite-pvc
  namespace: onabudget-namespace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: onabudget-migrate-job
  namespace: onabudget-namespace
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
        - name: drizzle-migrate
          image: andrerimes/onabudget:latest
          command: ["node", "/app/scripts/migrate.mjs"]
          envFrom:
            - configMapRef:
                name: onabudget-config
            - secretRef:
                name: onabudget-secret
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: onabudget-sqlite-pvc
      restartPolicy: Never
  backoffLimit: 4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onabudget-deployment
  namespace: onabudget-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onabudget
  template:
    metadata:
      labels:
        app: onabudget
    spec:
      containers:
        - name: onabudget
          image: andrerimes/onabudget:latest
          envFrom:
            - configMapRef:
                name: onabudget-config
            - secretRef:
                name: onabudget-secret
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
              cpu: "0.5"
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: onabudget-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: onabudget-service
  namespace: onabudget-namespace
spec:
  type: ClusterIP
  selector:
    app: onabudget
  ports:
    - port: 3000
      targetPort: 3000
