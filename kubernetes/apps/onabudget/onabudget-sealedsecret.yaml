---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: onabudget-secret
  namespace: onabudget-namespace
  annotations:
    # Wave -2: the controller must unseal this into onabudget-secret before the
    # migrate Job (-1) and Deployment (0) mount it.
    argocd.argoproj.io/sync-wave: "-2"
spec:
  encryptedData:
    BETTER_AUTH_SECRET: 
    BRAPI_API_TOKEN: 
    METRICS_TOKEN: 
  template:
    metadata:
      name: onabudget-secret
      namespace: onabudget-namespace
    type: Opaque
