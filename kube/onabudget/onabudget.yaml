apiVersion: v1
kind: Namespace
metadata:
  name: onabudget-namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: onabudget-config
  namespace: onabudget-namespace
data:
  NEXT_PUBLIC_PB: "https://onabudget.fly.dev"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onabudget-deployment
  namespace: onabudget-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onabudget
  template:
    metadata:
      labels:
        app: onabudget
    spec:
      containers:
      - name: onabudget
        image: andrerimes/onabudget:latest
        envFrom:
          - configMapRef:
              name: onabudget-config
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            memory: "512Mi"
            cpu: "0.5"
---
apiVersion: v1
kind: Service
metadata:
  name: onabudget-service
  namespace: onabudget-namespace
spec:
  type: ClusterIP
  selector:
    app: onabudget
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onabudget-hpa
  namespace: onabudget-namespace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onabudget-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80