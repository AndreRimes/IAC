apiVersion: v1
kind: Namespace
metadata:
  name: portfolio-namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deployment
  namespace: portfolio-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio
        image: andrerimes/portfolio:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "512Mi"
            cpu: "0.5"
          requests:
            memory: "256Mi"
            cpu: "0.25"
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: portfolio-namespace
spec:
  type: NodePort
  selector:
    app: portfolio
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30001