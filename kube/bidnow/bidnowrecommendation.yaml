apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidnow-recommendation
  namespace: bidnow-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bidnow-recommendation
  template:
    metadata:
      labels:
        app: bidnow-recommendation
    spec:
      containers:
      - name: bidnow-recommendation
        image: andrerimes/bidnow-recommendation:latest
        imagePullPolicy: Always
        env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: bidnow-recommendation-secret
              key: DB_URL
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: bidnow-recommendation-service
  namespace: bidnow-namespace
spec:
  type: ClusterIP
  selector:
    app: bidnow-recommendation
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000