---
apiVersion: v1
kind: Namespace
metadata:
  name: bidnow-namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bidnow-backend-config
  namespace: bidnow-namespace
data:
  NODE_ENV: "develop"
  AWS_REGION: "sa-east-1"
  AWS_S3_BUCKET: "andrerimes"
  RECOMMENDATION_MICROSERVICE_URL: "http://bidnow-recommendation.andrerimes.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidnow-backend
  namespace: bidnow-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bidnow-backend
  template:
    metadata:
      labels:
        app: bidnow-backend
    spec:
      containers:
      - name: bidnow-backend
        image: andrerimes/bidnow-back:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        - containerPort: 3334
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        envFrom:
        - configMapRef:
            name: bidnow-backend-config
        - secretRef:
            name: bidnow-backend-secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate-job
  namespace: bidnow-namespace
spec:
  template:
    spec:
      containers:
      - name: prisma-migrate
        image: andrerimes/bidnow-back:latest
        command: ["npx", "prisma", "migrate", "deploy"]
        envFrom:
        - configMapRef:
            name: bidnow-backend-config
        - secretRef:
            name: bidnow-backend-secret
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
      restartPolicy: Never
  backoffLimit: 4
---
apiVersion: v1
kind: Service
metadata:
  name: bidnow-backend-service
  namespace: bidnow-namespace
spec:
  type: NodePort
  selector:
    app: bidnow-backend
  ports:
  - name: http
    protocol: TCP
    port: 8081
    targetPort: 8081
    nodePort: 30003
  - name: websocket
    protocol: TCP
    port: 3334
    targetPort: 3334
    nodePort: 30005 