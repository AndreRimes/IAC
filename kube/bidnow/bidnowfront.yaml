---
apiVersion: v1
kind: Namespace
metadata:
  name: bidnow-namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidnow-frontend
  namespace: bidnow-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bidnow-frontend
  template:
    metadata:
      labels:
        app: bidnow-frontend
    spec:
      containers:
      - name: bidnow-frontend
        image: andrerimes/bidnow-front:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: bidnow-frontend-service
  namespace: bidnow-namespace
spec:
  type: NodePort
  selector:
    app: bidnow-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30002
