apiVersion: v1
kind: Service
metadata:
  name: bidnow-backend-external
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: bidnow-backend-service.bidnow-namespace.svc.cluster.local
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: bidnow-frontend-external
  namespace: ingress-nginx
spec:
  type: ExternalName
  externalName: bidnow-frontend-service.bidnow-namespace.svc.cluster.local
  ports:
    - port: 3000
      targetPort: 3000
--- 